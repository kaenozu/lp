name: Audit Production accessibility

on:
  workflow_run:
    workflows: ["Deploy to Cloudflare Pages"]
    types: [completed]
  pull_request:
    paths:
      - ".github/workflows/audit-production-accessibility.yml"
      - "tool/audit_production_accessibility.cjs"
      - "apps/ashita-motsumono/index.html"
      - "assets/app.js"
      - "assets/styles.css"
      - "assets/app-screenshots.css"
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: production-accessibility-${{ github.event.pull_request.number || 'production' }}
  cancel-in-progress: true

jobs:
  audit-accessibility:
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      TARGET_URL: https://lp-5t7.pages.dev/apps/ashita-motsumono/
      ACCESSIBILITY_AUDIT_DIR: production-audit/accessibility
      AUDIT_SHA: ${{ github.event.pull_request.head.sha || github.event.workflow_run.head_sha || github.sha }}

    steps:
      - name: Checkout audited revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha || github.event.workflow_run.head_sha || github.sha }}

      - name: Locate Chrome
        shell: bash
        run: |
          set -euo pipefail
          chrome_path="$(command -v google-chrome || command -v google-chrome-stable || command -v chromium || true)"
          if [[ -z "$chrome_path" ]]; then
            echo "::error::Chrome or Chromium was not found on the runner"
            exit 1
          fi
          echo "CHROME_PATH=$chrome_path" >> "$GITHUB_ENV"
          "$chrome_path" --version

      - name: Install Japanese fonts and Puppeteer
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends fonts-noto-cjk
          fc-cache -f

          mkdir -p "$ACCESSIBILITY_AUDIT_DIR"
          fc-match :lang=ja | tee "$ACCESSIBILITY_AUDIT_DIR/japanese-font-match.txt"
          grep -qi 'Noto' "$ACCESSIBILITY_AUDIT_DIR/japanese-font-match.txt"

          npm install \
            --no-save \
            --package-lock=false \
            --ignore-scripts \
            puppeteer-core@25.3.0

      - name: Wait for Production readiness
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 20); do
            if curl \
              --fail \
              --silent \
              --show-error \
              --location \
              --connect-timeout 5 \
              --max-time 15 \
              "$TARGET_URL" > /dev/null; then
              echo "Production is ready (attempt ${attempt}/20)"
              exit 0
            fi
            if (( attempt < 20 )); then sleep 3; fi
          done
          echo "::error::Production did not become ready: $TARGET_URL"
          exit 1

      - name: Audit direct access, semantics and text resize
        id: accessibility
        run: node tool/audit_production_accessibility.cjs

      - name: Upload accessibility audit evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: production-accessibility-audit
          path: production-audit/accessibility/
          if-no-files-found: warn
          retention-days: 30

      - name: Record Production accessibility status
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          AUDIT_OUTCOME: ${{ steps.accessibility.outcome }}
        run: |
          set -euo pipefail
          state=failure
          description="Production accessibility semantics audit failed"
          if [[ "$AUDIT_OUTCOME" == "success" ]]; then
            state=success
            description="Index access, semantics, AX names and 200% text resize verified"
          fi

          jq -n \
            --arg state "$state" \
            --arg target_url "$RUN_URL" \
            --arg description "$description" \
            --arg context "production-accessibility-semantics" \
            '{state: $state, target_url: $target_url, description: $description, context: $context}' \
            > status.json

          curl \
            --fail-with-body \
            --silent \
            --show-error \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --data @status.json \
            "${{ github.api_url }}/repos/${{ github.repository }}/statuses/${AUDIT_SHA}" \
            > /dev/null
