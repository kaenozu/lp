name: Audit accessibility

on:
  workflow_run:
    workflows: ["Deploy to Cloudflare Pages"]
    types: [completed]
  pull_request:
    paths:
      - ".github/workflows/audit-production-accessibility.yml"
      - "tool/**"
      - "apps/**"
      - "assets/**"
      - "_headers"
  workflow_dispatch:

concurrency:
  group: accessibility-${{ github.event.pull_request.number || github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: true

jobs:
  audit-accessibility:
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - slug: ashita-motsumono
            expected_real_screens: 4
          - slug: ehenotane
            expected_real_screens: 0

    steps:
      - name: Checkout audited revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha || github.event.workflow_run.head_sha || github.sha }}

      - name: Prepare pull request artifact
        if: github.event_name == 'pull_request'
        run: bash tool/prepare_site.sh

      - name: Start pull request site server
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          python3 -m http.server 8123 --directory _site > /tmp/lp-http-server.log 2>&1 &
          for attempt in $(seq 1 20); do
            if curl --fail --silent http://127.0.0.1:8123/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/lp-http-server.log
          exit 1

      - name: Resolve target URL
        shell: bash
        env:
          SLUG: ${{ matrix.slug }}
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            origin="http://127.0.0.1:8123"
          else
            origin="https://lp-5t7.pages.dev"
          fi
          echo "TARGET_URL=${origin}/apps/${SLUG}/" >> "$GITHUB_ENV"
          echo "ACCESSIBILITY_AUDIT_DIR=production-audit/accessibility/${SLUG}" >> "$GITHUB_ENV"

      - name: Locate Chrome
        shell: bash
        run: |
          set -euo pipefail
          chrome_path="$(command -v google-chrome || command -v google-chrome-stable || command -v chromium || true)"
          test -n "$chrome_path"
          echo "CHROME_PATH=$chrome_path" >> "$GITHUB_ENV"
          "$chrome_path" --version

      - name: Install Japanese fonts and Puppeteer
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends fonts-noto-cjk
          fc-cache -f
          mkdir -p "$ACCESSIBILITY_AUDIT_DIR"
          fc-match :lang=ja | tee "$ACCESSIBILITY_AUDIT_DIR/japanese-font-match.txt"
          grep -qi 'Noto' "$ACCESSIBILITY_AUDIT_DIR/japanese-font-match.txt"
          npm install --no-save --package-lock=false --ignore-scripts puppeteer-core@25.3.0

      - name: Audit direct access, semantics and text resize
        env:
          EXPECT_REAL_SCREENS: ${{ matrix.expected_real_screens }}
        run: node tool/audit_production_accessibility.cjs

      - name: Upload accessibility evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: accessibility-${{ matrix.slug }}-${{ github.run_id }}
          path: production-audit/accessibility/${{ matrix.slug }}/
          if-no-files-found: warn
          retention-days: 30

  record-status:
    if: >-
      always() &&
      github.event_name != 'pull_request' &&
      (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success')
    needs: audit-accessibility
    permissions:
      statuses: write
    runs-on: ubuntu-latest
    steps:
      - name: Record accessibility status
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          AUDIT_RESULT: ${{ needs.audit-accessibility.result }}
          AUDIT_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          state=failure
          description="Accessibility audit failed for one or more apps"
          if [[ "$AUDIT_RESULT" == "success" ]]; then
            state=success
            description="Both app accessibility, semantics and 200% resize verified"
          fi
          jq -n \
            --arg state "$state" \
            --arg target_url "$RUN_URL" \
            --arg description "$description" \
            --arg context "production-accessibility-semantics" \
            '{state: $state, target_url: $target_url, description: $description, context: $context}' \
            > status.json
          curl \
            --fail-with-body \
            --silent \
            --show-error \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --data @status.json \
            "${{ github.api_url }}/repos/${{ github.repository }}/statuses/${AUDIT_SHA}" \
            > /dev/null
