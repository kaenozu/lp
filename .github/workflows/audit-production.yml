name: Audit Production LP

on:
  workflow_run:
    workflows: ["Deploy to Cloudflare Pages"]
    types: [completed]
  workflow_dispatch:
  schedule:
    - cron: "23 3 * * 1"

concurrency:
  group: production-lp-audit
  cancel-in-progress: true

jobs:
  audit:
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout audited revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Prepare expected artifact
        run: |
          bash tool/prepare_site.sh
          python3 tool/validate_site.py _site

      - name: Locate Chrome
        shell: bash
        run: |
          set -euo pipefail
          chrome_path="$(command -v google-chrome || command -v google-chrome-stable || command -v chromium || true)"
          test -n "$chrome_path"
          echo "CHROME_PATH=$chrome_path" >> "$GITHUB_ENV"
          "$chrome_path" --version

      - name: Install browser audit tooling
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends fonts-noto-cjk
          fc-cache -f
          mkdir -p production-audit/browser
          fc-match :lang=ja | tee production-audit/browser/japanese-font-match.txt
          grep -qi 'Noto' production-audit/browser/japanese-font-match.txt
          npm install --no-save --package-lock=false --ignore-scripts puppeteer-core@25.3.0
          npm install --global @lhci/cli@0.15.1

      - name: Verify all Production pages and assets
        id: readiness
        run: python3 tool/verify_remote_site.py https://lp-5t7.pages.dev _site

      - name: Capture あしたもつもの browser evidence
        id: ashita-browser
        env:
          TARGET_URL: https://lp-5t7.pages.dev/apps/ashita-motsumono/
          AUDIT_BROWSER_DIR: production-audit/browser/ashita-motsumono
        run: |
          set -euo pipefail
          mkdir -p "$AUDIT_BROWSER_DIR"
          curl --fail --silent --show-error --location "$TARGET_URL" > "$AUDIT_BROWSER_DIR/javascript-disabled.html"
          test "$(grep -o 'class="phone-mock"' "$AUDIT_BROWSER_DIR/javascript-disabled.html" | wc -l)" -eq 4
          node tool/capture_production_screenshots.cjs
          node tool/audit_screenshot_fallback.cjs

      - name: Capture へぇの種 browser evidence
        id: ehenotane-browser
        env:
          TARGET_URL: https://lp-5t7.pages.dev/apps/ehenotane/
          AUDIT_BROWSER_DIR: production-audit/browser/ehenotane
        run: node tool/audit_ehenotane.cjs

      - name: Collect Lighthouse reports for both apps
        id: lighthouse
        shell: bash
        run: |
          set -euo pipefail
          rm -rf production-audit/lighthouse .lighthouseci
          for slug in ashita-motsumono ehenotane; do
            export LHCI_TARGET_URL="https://lp-5t7.pages.dev/apps/${slug}/"
            export LHCI_APP_SLUG="$slug"
            lhci autorun --config=./lighthouserc.mobile.cjs
            rm -rf .lighthouseci
            lhci autorun --config=./lighthouserc.desktop.cjs
            rm -rf .lighthouseci
          done

      - name: Summarize Lighthouse scores
        id: summarize
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import json
          import statistics

          root = Path('production-audit/lighthouse')
          categories = ('performance', 'accessibility', 'best-practices', 'seo')
          apps = ('ashita-motsumono', 'ehenotane')
          payload = {}

          def median_scores(manifest_path):
              manifest = json.loads(manifest_path.read_text(encoding='utf-8'))
              values = {name: [] for name in categories}
              for entry in manifest:
                  summary = entry['summary']
                  for name in categories:
                      values[name].append(round(float(summary[name]) * 100))
              return {name: round(statistics.median(scores)) for name, scores in values.items()}

          for app in apps:
              payload[app] = {}
              for mode in ('mobile', 'desktop'):
                  payload[app][mode] = median_scores(root / app / mode / 'manifest.json')

          output = {'url_origin': 'https://lp-5t7.pages.dev', 'apps': payload}
          Path('production-audit/lighthouse-summary.json').write_text(
              json.dumps(output, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8',
          )

          lines = [
              '## Production Lighthouse',
              '',
              '| App | Mode | Performance | Accessibility | Best Practices | SEO |',
              '|---|---|---:|---:|---:|---:|',
          ]
          for app, modes in payload.items():
              for mode, scores in modes.items():
                  lines.append(
                      f"| {app} | {mode} | {scores['performance']} | {scores['accessibility']} | "
                      f"{scores['best-practices']} | {scores['seo']} |"
                  )
          with open(Path.cwd() / Path(__import__('os').environ['GITHUB_STEP_SUMMARY']), 'a', encoding='utf-8') as handle:
              handle.write('\n'.join(lines) + '\n')

          minimum = min(
              score
              for modes in payload.values()
              for scores in modes.values()
              for name, score in scores.items()
              if name != 'performance'
          )
          with open(__import__('os').environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as handle:
              handle.write(f'description=Both apps audited; minimum quality score {minimum}\n')
          PY

      - name: Upload Production audit evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: production-lp-audit
          path: production-audit/
          if-no-files-found: warn
          retention-days: 30

  record-status:
    if: >-
      always() &&
      (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success')
    needs: audit
    permissions:
      statuses: write
    runs-on: ubuntu-latest
    steps:
      - name: Record Production audit statuses
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          AUDIT_RESULT: ${{ needs.audit.result }}
          AUDIT_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          post_status() {
            local context="$1"
            local state="$2"
            local description="$3"
            jq -n \
              --arg state "$state" \
              --arg target_url "$RUN_URL" \
              --arg description "$description" \
              --arg context "$context" \
              '{state: $state, target_url: $target_url, description: $description, context: $context}' \
              > status.json
            curl \
              --fail-with-body \
              --silent \
              --show-error \
              --request POST \
              --header "Accept: application/vnd.github+json" \
              --header "Authorization: Bearer ${GH_TOKEN}" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              --data @status.json \
              "${{ github.api_url }}/repos/${{ github.repository }}/statuses/${AUDIT_SHA}" \
              > /dev/null
          }

          if [[ "$AUDIT_RESULT" == "success" ]]; then
            post_status "production-browser-verification" "success" "Both app browser flows and fallbacks verified"
            post_status "lighthouse-production" "success" "Both app Lighthouse thresholds passed"
          else
            post_status "production-browser-verification" "failure" "Production browser or fallback audit failed"
            post_status "lighthouse-production" "failure" "Production Lighthouse audit failed"
          fi
