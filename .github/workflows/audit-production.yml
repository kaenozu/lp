name: Audit Production LP

on:
  workflow_run:
    workflows: ["Deploy to Cloudflare Pages"]
    types: [completed]
  workflow_dispatch:
  schedule:
    - cron: "23 3 * * 1"

permissions:
  contents: read
  statuses: write

concurrency:
  group: production-lp-audit
  cancel-in-progress: true

jobs:
  audit:
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PRODUCTION_URL: https://lp-5t7.pages.dev
      TARGET_URL: https://lp-5t7.pages.dev/apps/ashita-motsumono/
      AUDIT_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}

    steps:
      - name: Checkout audited revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Locate Chrome
        shell: bash
        run: |
          set -euo pipefail
          chrome_path="$(command -v google-chrome || command -v google-chrome-stable || command -v chromium || true)"
          if [[ -z "$chrome_path" ]]; then
            echo "::error::Chrome or Chromium was not found on the runner"
            exit 1
          fi
          echo "CHROME_PATH=$chrome_path" >> "$GITHUB_ENV"
          "$chrome_path" --version

      - name: Wait for Production readiness
        id: readiness
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 20); do
            if curl \
              --fail \
              --silent \
              --show-error \
              --location \
              --connect-timeout 5 \
              --max-time 15 \
              "$TARGET_URL" > /dev/null; then
              echo "Production is ready (attempt ${attempt}/20)"
              exit 0
            fi
            if (( attempt < 20 )); then
              sleep 3
            fi
          done
          echo "::error::Production did not become ready: $TARGET_URL"
          exit 1

      - name: Capture browser and fallback evidence
        id: browser
        shell: bash
        run: |
          set -euo pipefail
          output_dir="production-audit/browser"
          mkdir -p "$output_dir"

          common_flags=(
            --headless=new
            --no-sandbox
            --disable-dev-shm-usage
            --hide-scrollbars
            --force-device-scale-factor=1
            --virtual-time-budget=5000
          )

          "$CHROME_PATH" "${common_flags[@]}" \
            --dump-dom "$TARGET_URL" \
            > "$output_dir/javascript-enabled.html"

          real_screen_count="$(grep -o 'class="real-app-screen"' "$output_dir/javascript-enabled.html" | wc -l)"
          test "$real_screen_count" -eq 4
          grep -q 'loading="eager"' "$output_dir/javascript-enabled.html"
          grep -q 'loading="lazy"' "$output_dir/javascript-enabled.html"
          grep -q 'fetchpriority="high"' "$output_dir/javascript-enabled.html"

          "$CHROME_PATH" "${common_flags[@]}" \
            --blink-settings=scriptEnabled=false \
            --dump-dom "$TARGET_URL" \
            > "$output_dir/javascript-disabled.html"

          fallback_count="$(grep -o 'class="phone-mock"' "$output_dir/javascript-disabled.html" | wc -l)"
          test "$fallback_count" -eq 4
          if grep -q 'class="real-app-screen"' "$output_dir/javascript-disabled.html"; then
            echo "::error::Real screenshots were injected while JavaScript was disabled"
            exit 1
          fi

          capture() {
            local width="$1"
            local height="$2"
            local name="$3"
            local url="$4"
            "$CHROME_PATH" "${common_flags[@]}" \
              --window-size="${width},${height}" \
              --screenshot="$output_dir/${name}.png" \
              "$url"
            test -s "$output_dir/${name}.png"
          }

          screens_url="${TARGET_URL}#:~:text=画面イメージ"
          capture 390 844 mobile-top "$TARGET_URL"
          capture 390 844 mobile-screens "$screens_url"
          capture 820 1180 tablet-screens "$screens_url"
          capture 1440 1200 desktop-top "$TARGET_URL"
          capture 1440 1200 desktop-screens "$screens_url"

      - name: Install Lighthouse CI
        shell: bash
        run: npm install --global @lhci/cli@0.15.1

      - name: Collect mobile and desktop Lighthouse reports
        id: lighthouse
        shell: bash
        env:
          LHCI_TARGET_URL: ${{ env.TARGET_URL }}
        run: |
          set -euo pipefail
          rm -rf production-audit/lighthouse .lighthouseci
          lhci autorun --config=./lighthouserc.mobile.cjs
          rm -rf .lighthouseci
          lhci autorun --config=./lighthouserc.desktop.cjs

      - name: Summarize Lighthouse scores
        id: summarize
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import json
          import os

          root = Path('production-audit/lighthouse')
          categories = ('performance', 'accessibility', 'best-practices', 'seo')

          def read_scores(mode):
              manifest = json.loads((root / mode / 'manifest.json').read_text(encoding='utf-8'))
              representative = next((entry for entry in manifest if entry.get('isRepresentativeRun')), manifest[0])
              summary = representative['summary']
              return {name: round(float(summary[name]) * 100) for name in categories}

          mobile = read_scores('mobile')
          desktop = read_scores('desktop')
          payload = {
              'url': os.environ['TARGET_URL'],
              'mobile': mobile,
              'desktop': desktop,
          }
          Path('production-audit/lighthouse-summary.json').write_text(
              json.dumps(payload, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8',
          )

          lines = [
              '## Production Lighthouse',
              '',
              f"Target: `{payload['url']}`",
              '',
              '| Mode | Performance | Accessibility | Best Practices | SEO |',
              '|---|---:|---:|---:|---:|',
              f"| Mobile | {mobile['performance']} | {mobile['accessibility']} | {mobile['best-practices']} | {mobile['seo']} |",
              f"| Desktop | {desktop['performance']} | {desktop['accessibility']} | {desktop['best-practices']} | {desktop['seo']} |",
              '',
              'Reports and browser screenshots are stored in the `production-lp-audit` artifact.',
          ]
          with open(os.environ['GITHUB_STEP_SUMMARY'], 'a', encoding='utf-8') as summary_file:
              summary_file.write('\n'.join(lines) + '\n')

          description = (
              f"M P{mobile['performance']} A{mobile['accessibility']} "
              f"B{mobile['best-practices']} S{mobile['seo']}; "
              f"D P{desktop['performance']} A{desktop['accessibility']} "
              f"B{desktop['best-practices']} S{desktop['seo']}"
          )
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as output_file:
              output_file.write(f'description={description}\n')
          PY

      - name: Upload Production audit evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: production-lp-audit
          path: production-audit/
          if-no-files-found: warn
          retention-days: 30

      - name: Record Production audit statuses
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          READINESS_OUTCOME: ${{ steps.readiness.outcome }}
          BROWSER_OUTCOME: ${{ steps.browser.outcome }}
          LIGHTHOUSE_OUTCOME: ${{ steps.lighthouse.outcome }}
          SUMMARY_OUTCOME: ${{ steps.summarize.outcome }}
          SCORE_DESCRIPTION: ${{ steps.summarize.outputs.description }}
        run: |
          set -euo pipefail

          post_status() {
            local context="$1"
            local state="$2"
            local description="$3"
            jq -n \
              --arg state "$state" \
              --arg target_url "$RUN_URL" \
              --arg description "$description" \
              --arg context "$context" \
              '{state: $state, target_url: $target_url, description: $description, context: $context}' \
              > status.json
            curl \
              --fail-with-body \
              --silent \
              --show-error \
              --request POST \
              --header "Accept: application/vnd.github+json" \
              --header "Authorization: Bearer ${GH_TOKEN}" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              --data @status.json \
              "${{ github.api_url }}/repos/${{ github.repository }}/statuses/${AUDIT_SHA}" \
              > /dev/null
          }

          browser_state=failure
          browser_description="Production browser verification failed"
          if [[ "$READINESS_OUTCOME" == "success" && "$BROWSER_OUTCOME" == "success" ]]; then
            browser_state=success
            browser_description="Responsive screenshots and JS fallback verified"
          fi
          post_status "production-browser-verification" "$browser_state" "$browser_description"

          lighthouse_state=failure
          lighthouse_description="Production Lighthouse audit failed"
          if [[ "$LIGHTHOUSE_OUTCOME" == "success" && "$SUMMARY_OUTCOME" == "success" ]]; then
            lighthouse_state=success
            lighthouse_description="${SCORE_DESCRIPTION:-Production Lighthouse reports collected}"
          fi
          post_status "lighthouse-production" "$lighthouse_state" "$lighthouse_description"
