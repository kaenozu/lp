name: Daily Production LP Health

on:
  workflow_dispatch:
  schedule:
    - cron: "17 21 * * *"

permissions:
  contents: read
  issues: write

env:
  SEARCH_CONSOLE_VERIFICATION: ${{ vars.SEARCH_CONSOLE_VERIFICATION }}

concurrency:
  group: daily-production-lp-health
  cancel-in-progress: true

jobs:
  health:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Prepare expected artifact
        run: |
          bash tool/prepare_site.sh
          python3 tool/validate_site.py _site

      - name: Check Production pages, assets, and headers
        id: production-health
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          {
            python3 tool/verify_remote_site.py https://lp-5t7.pages.dev _site
            python3 tool/check_production_headers.py https://lp-5t7.pages.dev/
          } 2>&1 | tee production-health.log

      - name: Upload failed health-check log
        if: steps.production-health.outcome != 'success'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: production-health-failure
          path: production-health.log
          if-no-files-found: error
          retention-days: 14

      - name: Open or resolve Production health issue
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          HEALTH_OUTCOME: ${{ steps.production-health.outcome }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          title='[monitor] Production LP health check failed'
          issue_number="$(
            gh issue list \
              --repo "$GITHUB_REPOSITORY" \
              --state open \
              --limit 100 \
              --json number,title \
              --jq '.[] | select(.title == "[monitor] Production LP health check failed") | .number' \
              | head -n 1
          )"

          if [[ "$HEALTH_OUTCOME" == "success" ]]; then
            if [[ -n "$issue_number" ]]; then
              gh issue comment "$issue_number" \
                --repo "$GITHUB_REPOSITORY" \
                --body "Production health check recovered. Run: $RUN_URL"
              gh issue close "$issue_number" \
                --repo "$GITHUB_REPOSITORY" \
                --reason completed
            fi
            exit 0
          fi

          {
            echo 'Production LPの定期死活監視が失敗しました。'
            echo
            echo "- Workflow: $RUN_URL"
            echo "- Checked origin: https://lp-5t7.pages.dev"
            echo
            echo '```text'
            tail -n 80 production-health.log 2>/dev/null || echo 'health-check log was not created'
            echo '```'
          } > issue-body.md

          if [[ -n "$issue_number" ]]; then
            gh issue comment "$issue_number" \
              --repo "$GITHUB_REPOSITORY" \
              --body-file issue-body.md
          else
            gh issue create \
              --repo "$GITHUB_REPOSITORY" \
              --title "$title" \
              --body-file issue-body.md
          fi

      - name: Fail workflow when Production is unhealthy
        if: steps.production-health.outcome != 'success'
        run: exit 1
