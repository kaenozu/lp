name: Deploy to Cloudflare Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: cloudflare-pages-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Prepare and validate site artifact
        run: |
          bash tool/prepare_site.sh
          python3 tool/validate_site.py _site
          while IFS= read -r -d '' file; do
            node --check "$file"
          done < <(find _site -type f -name '*.js' -print0 | sort -z)

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.81.0"
          command: pages deploy _site --project-name lp --branch master

      - name: Verify deployment-specific URL
        id: verify
        continue-on-error: true
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
        run: |
          set -euo pipefail
          test -n "$DEPLOYMENT_URL"
          python3 tool/verify_remote_site.py "${DEPLOYMENT_URL%/}" _site

      - name: Smoke test Production
        id: smoke
        run: python3 tool/verify_remote_site.py https://lp-5t7.pages.dev _site

      - name: Report deployment statuses
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
          DEPLOY_OUTCOME: ${{ steps.deploy.outcome }}
          VERIFY_OUTCOME: ${{ steps.verify.outcome }}
          SMOKE_OUTCOME: ${{ steps.smoke.outcome }}
          PRODUCTION_URL: https://lp-5t7.pages.dev
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          post_status() {
            local context="$1"
            local state="$2"
            local description="$3"
            local target_url="$4"
            jq -n \
              --arg state "$state" \
              --arg target_url "$target_url" \
              --arg description "$description" \
              --arg context "$context" \
              '{state: $state, target_url: $target_url, description: $description, context: $context}' \
              > status.json
            curl \
              --fail-with-body \
              --silent \
              --show-error \
              --request POST \
              --header "Accept: application/vnd.github+json" \
              --header "Authorization: Bearer ${GH_TOKEN}" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              --data @status.json \
              "https://api.github.com/repos/${REPOSITORY}/statuses/${COMMIT_SHA}" \
              > /dev/null
          }

          if [[ "$DEPLOY_OUTCOME" == "success" && "$SMOKE_OUTCOME" == "success" ]]; then
            post_status \
              "cloudflare-pages-production" \
              "success" \
              "Production deployment and all public URL checks succeeded" \
              "$PRODUCTION_URL"
          else
            post_status \
              "cloudflare-pages-production" \
              "failure" \
              "Production deployment or public URL verification failed" \
              "$RUN_URL"
          fi

          if [[ "$DEPLOY_OUTCOME" == "success" && "$VERIFY_OUTCOME" == "success" ]]; then
            post_status \
              "cloudflare-pages-brand-verification" \
              "success" \
              "Deployment metadata and assets verified" \
              "$RUN_URL"
          else
            post_status \
              "cloudflare-pages-brand-verification" \
              "failure" \
              "Deployment metadata or asset verification failed" \
              "$RUN_URL"
          fi
