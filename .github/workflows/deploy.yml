# C:\gemini-desktop\LP\.github\workflows\deploy.yml
# masterブランチへのプッシュ時にCloudflare Pagesへ自動デプロイ
# wrangler pages deploy を CI から実行する（Direct Upload方式）
# 関連: .github/workflows/deploy.yml, wrangler不要（静的サイト）

name: Deploy to Cloudflare Pages

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name lp --branch master
