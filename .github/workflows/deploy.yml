# masterブランチへのプッシュ時にCloudflare Pagesへ自動デプロイ
# Direct Upload方式のPagesプロジェクトへWrangler経由で配信する

name: Deploy to Cloudflare Pages

on:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name lp --branch master
