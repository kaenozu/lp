# masterブランチへのプッシュ時にCloudflare Pagesへ自動デプロイ
# Direct Upload方式のPagesプロジェクトへWrangler経由で配信する

name: Deploy to Cloudflare Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: cloudflare-pages-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Prepare site artifact
        shell: bash
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site
          cp index.html robots.txt sitemap.xml _site/
          cp -R assets apps _site/
          test -f _site/index.html
          test -d _site/assets
          test -d _site/apps

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.81.0"
          command: pages deploy _site --project-name lp --branch master

      - name: Verify deployed artifact brand assets and metadata
        shell: bash
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
        run: |
          set -euo pipefail
          base_url="${DEPLOYMENT_URL%/}"
          test -n "$base_url"
          temp_dir="$(mktemp -d)"
          trap 'rm -rf "$temp_dir"' EXIT

          fetch_url() {
            local path="$1"
            local output="$2"

            curl \
              --fail \
              --silent \
              --show-error \
              --location \
              --retry 2 \
              --retry-delay 1 \
              --retry-all-errors \
              --connect-timeout 5 \
              --max-time 15 \
              "${base_url}${path}" \
              --output "$output"
          }

          verify_asset() {
            local path="$1"
            local local_file="_site${path}"
            local downloaded_file="${temp_dir}/$(basename "$path")"
            local expected_hash
            local actual_hash
            local fetched=false

            expected_hash="$(sha256sum "$local_file" | cut -d ' ' -f 1)"

            for attempt in $(seq 1 5); do
              if fetch_url "$path" "$downloaded_file"; then
                fetched=true
                actual_hash="$(sha256sum "$downloaded_file" | cut -d ' ' -f 1)"
                if [[ "$actual_hash" == "$expected_hash" ]]; then
                  echo "Verified asset: $path"
                  return 0
                fi
              fi

              echo "Asset not ready yet: $path (attempt ${attempt}/5)"
              if (( attempt < 5 )); then
                sleep 2
              fi
            done

            if [[ "$fetched" == false ]]; then
              echo "Asset missing or unreachable on deployment URL: $path" >&2
            else
              echo "Deployed asset differs from prepared artifact: $path" >&2
            fi
            return 1
          }

          verify_html_marker_from_source() {
            local path="$1"
            local local_file="$2"
            local selector="$3"
            local expected_marker
            local downloaded_file="${temp_dir}/page-$(printf '%s' "$path" | sha256sum | cut -d ' ' -f 1).html"
            local fetched=false

            expected_marker="$(grep -m1F "$selector" "$local_file" | sed -E 's/^[[:space:]]+//')"

            for attempt in $(seq 1 5); do
              if fetch_url "$path" "$downloaded_file"; then
                fetched=true
                if grep -qF "$expected_marker" "$downloaded_file"; then
                  echo "Verified metadata: $path"
                  return 0
                fi
              fi

              echo "Metadata not ready yet: $path (attempt ${attempt}/5)"
              if (( attempt < 5 )); then
                sleep 2
              fi
            done

            if [[ "$fetched" == false ]]; then
              echo "Page missing or unreachable on deployment URL: $path" >&2
            else
              echo "Expected metadata was not found on deployment URL: $path" >&2
              echo "Marker: $expected_marker" >&2
            fi
            return 1
          }

          assets=(
            "/assets/brand/favicon.svg"
            "/assets/brand/favicon-32x32.png"
            "/assets/brand/favicon-16x16.png"
            "/assets/brand/apple-touch-icon.png"
            "/assets/brand/og-portal.png"
            "/assets/brand/og-ashita-motsumono.png"
            "/assets/brand/og-ehenotane.png"
          )

          for asset in "${assets[@]}"; do
            verify_asset "$asset"
          done

          verify_html_marker_from_source "/" "_site/index.html" 'href="/assets/brand/favicon.svg"'
          verify_html_marker_from_source "/" "_site/index.html" 'property="og:image"'
          verify_html_marker_from_source "/apps/ashita-motsumono/" "_site/apps/ashita-motsumono/index.html" 'property="og:image"'
          verify_html_marker_from_source "/apps/ehenotane/" "_site/apps/ehenotane/index.html" 'property="og:image"'

      - name: Smoke test production
        shell: bash
        run: |
          set -euo pipefail
          base_url="https://lp-5t7.pages.dev"
          paths=(
            "/"
            "/robots.txt"
            "/sitemap.xml"
            "/apps/ashita-motsumono/"
            "/apps/ehenotane/"
          )

          for path in "${paths[@]}"; do
            curl \
              --fail \
              --silent \
              --show-error \
              --location \
              --retry 10 \
              --retry-delay 3 \
              --retry-all-errors \
              --connect-timeout 10 \
              --max-time 30 \
              "${base_url}${path}" > /dev/null
          done

      - name: Report deployment status
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
          JOB_STATUS: ${{ job.status }}
          TARGET_URL: https://lp-5t7.pages.dev
        run: |
          set -euo pipefail

          case "$JOB_STATUS" in
            success)
              state="success"
              description="Cloudflare Pages production deployment succeeded"
              ;;
            cancelled)
              state="error"
              description="Cloudflare Pages production deployment was cancelled"
              ;;
            *)
              state="failure"
              description="Cloudflare Pages production deployment failed"
              ;;
          esac

          payload=$(jq -n \
            --arg state "$state" \
            --arg target_url "$TARGET_URL" \
            --arg description "$description" \
            --arg context "cloudflare-pages-production" \
            '{state: $state, target_url: $target_url, description: $description, context: $context}')

          curl \
            --fail-with-body \
            --silent \
            --show-error \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPOSITORY}/statuses/${COMMIT_SHA}" \
            --data "$payload" > /dev/null
