# masterブランチへのプッシュ時にCloudflare Pagesへ自動デプロイ
# Direct Upload方式のPagesプロジェクトへWrangler経由で配信する

name: Deploy to Cloudflare Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: cloudflare-pages-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Prepare site artifact
        shell: bash
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site
          cp index.html robots.txt sitemap.xml _site/
          cp -R assets apps _site/
          test -f _site/index.html
          test -d _site/assets
          test -d _site/apps

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.81.0"
          command: pages deploy _site --project-name lp --branch master

      - name: Smoke test production
        shell: bash
        run: |
          set -euo pipefail
          base_url="https://lp-5t7.pages.dev"
          paths=(
            "/"
            "/robots.txt"
            "/sitemap.xml"
            "/apps/ashita-motsumono/"
            "/apps/ehenotane/"
          )

          for path in "${paths[@]}"; do
            curl \
              --fail \
              --silent \
              --show-error \
              --location \
              --retry 10 \
              --retry-delay 3 \
              --retry-all-errors \
              --connect-timeout 10 \
              --max-time 30 \
              "${base_url}${path}" > /dev/null
          done

      - name: Report deployment status
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
          JOB_STATUS: ${{ job.status }}
          TARGET_URL: https://lp-5t7.pages.dev
        run: |
          set -euo pipefail

          case "$JOB_STATUS" in
            success)
              state="success"
              description="Cloudflare Pages production deployment succeeded"
              ;;
            cancelled)
              state="error"
              description="Cloudflare Pages production deployment was cancelled"
              ;;
            *)
              state="failure"
              description="Cloudflare Pages production deployment failed"
              ;;
          esac

          payload=$(jq -n \
            --arg state "$state" \
            --arg target_url "$TARGET_URL" \
            --arg description "$description" \
            --arg context "cloudflare-pages-production" \
            '{state: $state, target_url: $target_url, description: $description, context: $context}')

          curl \
            --fail-with-body \
            --silent \
            --show-error \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPOSITORY}/statuses/${COMMIT_SHA}" \
            --data "$payload" > /dev/null
