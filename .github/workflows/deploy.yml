# masterブランチへのプッシュ時にCloudflare Pagesへ自動デプロイ
# Direct Upload方式のPagesプロジェクトへWrangler経由で配信する

name: Deploy to Cloudflare Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-pages-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Prepare site artifact
        shell: bash
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site
          cp index.html robots.txt sitemap.xml _site/
          cp -R assets apps _site/
          test -f _site/index.html
          test -d _site/assets
          test -d _site/apps

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy _site --project-name lp --branch master

      - name: Smoke test production
        shell: bash
        run: |
          set -euo pipefail
          base_url="https://lp-5t7.pages.dev"
          paths=(
            "/"
            "/robots.txt"
            "/sitemap.xml"
            "/apps/ashita-motsumono/"
            "/apps/ehenotane/"
          )

          for path in "${paths[@]}"; do
            curl \
              --fail \
              --silent \
              --show-error \
              --location \
              --retry 10 \
              --retry-delay 3 \
              --retry-all-errors \
              --connect-timeout 10 \
              --max-time 30 \
              "${base_url}${path}" > /dev/null
          done
