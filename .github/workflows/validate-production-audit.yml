name: Validate Production audit

on:
  pull_request:
    paths:
      - ".github/workflows/audit-production.yml"
      - ".github/workflows/audit-production-accessibility.yml"
      - ".github/workflows/validate-production-audit.yml"
      - ".github/workflows/validate-production-browser.yml"
      - "lighthouserc.*.cjs"
      - "tool/**"
      - "apps/**"
      - "assets/**"
      - "_headers"

permissions:
  contents: read

concurrency:
  group: validate-production-audit-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check JavaScript configuration syntax
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' file; do
            node --check "$file"
          done < <(find tool -type f -name '*.cjs' -print0 | sort -z)
          node --check lighthouserc.mobile.cjs
          node --check lighthouserc.desktop.cjs

      - name: Validate Production audit contracts
        run: |
          python3 -m unittest tool/test_production_audit.py
          python3 -m unittest tool/test_production_accessibility_audit.py
