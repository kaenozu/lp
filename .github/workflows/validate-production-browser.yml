name: Validate browser behavior

on:
  pull_request:
    paths:
      - ".github/workflows/audit-production.yml"
      - ".github/workflows/validate-production-browser.yml"
      - "tool/**"
      - "index.html"
      - "apps/**"
      - "assets/**"
      - "_headers"

permissions:
  contents: read

concurrency:
  group: browser-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate-browser:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout pull request head
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Prepare pull request artifact
        run: bash tool/prepare_site.sh

      - name: Start local site server
        shell: bash
        run: |
          set -euo pipefail
          python3 -m http.server 8123 --directory _site > /tmp/lp-http-server.log 2>&1 &
          echo $! > /tmp/lp-http-server.pid
          for attempt in $(seq 1 20); do
            if curl --fail --silent http://127.0.0.1:8123/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/lp-http-server.log
          exit 1

      - name: Locate Chrome
        shell: bash
        run: |
          set -euo pipefail
          chrome_path="$(command -v google-chrome || command -v google-chrome-stable || command -v chromium || true)"
          test -n "$chrome_path"
          echo "CHROME_PATH=$chrome_path" >> "$GITHUB_ENV"
          "$chrome_path" --version

      - name: Install Japanese fonts and Puppeteer
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends fonts-noto-cjk
          fc-cache -f
          npm install --no-save --package-lock=false --ignore-scripts puppeteer-core@25.3.0

      - name: Audit あしたもつもの
        env:
          TARGET_URL: http://127.0.0.1:8123/apps/ashita-motsumono/
          AUDIT_BROWSER_DIR: production-audit/browser/ashita-motsumono
        run: |
          node tool/capture_production_screenshots.cjs
          node tool/audit_screenshot_fallback.cjs

      - name: Audit へぇの種
        env:
          TARGET_URL: http://127.0.0.1:8123/apps/ehenotane/
          AUDIT_BROWSER_DIR: production-audit/browser/ehenotane
        run: node tool/audit_ehenotane.cjs

      - name: Upload browser audit evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: browser-pr-audit-${{ github.event.pull_request.number }}
          path: production-audit/browser/
          if-no-files-found: warn
          retention-days: 7
