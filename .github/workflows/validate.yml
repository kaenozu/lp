name: Validate site artifact

on:
  pull_request:
    paths:
      - "index.html"
      - "robots.txt"
      - "sitemap.xml"
      - "_headers"
      - "assets/**"
      - "apps/**"
      - "tool/**"
      - "docs/**"
      - ".github/workflows/**"

permissions:
  contents: read

concurrency:
  group: validate-site-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Prepare site artifact
        run: bash tool/prepare_site.sh

      - name: Check JavaScript syntax
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' file; do
            node --check "$file"
          done < <(find _site tool -type f \( -name '*.js' -o -name '*.cjs' \) -print0 | sort -z)

      - name: Validate site artifact
        run: python3 tool/validate_site.py _site

      - name: Validate audit and release-operation contracts
        run: |
          python3 -m unittest tool/test_production_audit.py
          python3 -m unittest tool/test_production_accessibility_audit.py
          python3 -m unittest tool/test_release_operations.py
